name: Diagnose Gmail (temporary)

on:
  workflow_dispatch:
    inputs:
      since_date:
        description: "IMAP SINCE date (dd-Mon-yyyy)"
        required: false
        default: "01-May-2026"

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run diagnostic
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          EMAIL_SUBJECT_FILTER: "爬虫监控"
          SINCE_DATE: ${{ github.event.inputs.since_date }}
        run: |
          python .github/scripts/diagnose_gmail.py
